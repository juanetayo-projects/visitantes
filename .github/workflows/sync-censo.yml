name: Sync CENSO Hospitalario

on:
  schedule:
    - cron: '0 * * * *'   # cada hora en punto (UTC)
  workflow_dispatch:        # permite ejecutarlo a mano

concurrency:
  group: sync-censo
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      # Llama a la Edge Function censo-sync (misma lógica que el botón manual de la app).
      # La función lee las credenciales del CENSO desde sus propios secrets en Supabase.
      - name: Ejecutar sincronización
        run: |
          curl -fsS -X POST "${SUPABASE_URL%/}/functions/v1/censo-sync" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -w "\nHTTP %{http_code}\n"
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
